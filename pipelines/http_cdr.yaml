# HTTP话单管道（分隔符为 |++|）
name: http_cdr
watch_dir: /data/probe/http
file_pattern: "*.log"
delimiter: "|++|"
has_header_meta: false
field_names:
  - timestamp
  - client_ip
  - server_ip
  - method
  - url
  - status_code
  - bytes_sent
fields:
  - name: timestamp
    type: DateTime
    layout: "2006-01-02 15:04:05"
  - name: client_ip
    type: IPv4
  - name: server_ip
    type: IPv4
  - name: method
    type: LowCardinality(String)
  - name: url
    type: String
  - name: status_code
    type: UInt16
  - name: bytes_sent
    type: UInt64
transformers:
  - type: ip_matcher
    fields:
      - client_ip
      - server_ip
    label_fields:
      - client_geo
      - server_geo
  - type: dict_mapper
    field: method
    dict:
      "1": "GET"
      "2": "POST"
      "3": "HEAD"
clickhouse_table: raw.http_log
workers: 4
batch_size: 5000
retry_failed: true
max_retries: 3
retry_interval: 60s
dead_letter_dir: /data/probe/dead/http
archive_dir: /data/probe/archive/http
cleanup_marker: true
