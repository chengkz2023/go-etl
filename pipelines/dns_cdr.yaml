# DNS CDR pipeline
name: dns_cdr
watch_dir: /data/probe/dns
file_pattern: "*.csv"
delimiter: "|"
has_header_meta: true
header_fields:
  - name: probe_id
    type: LowCardinality(String)
  - name: region
    type: LowCardinality(String)
fields:
  - name: timestamp
    type: DateTime
    layout: "2006-01-02 15:04:05"
  - name: src_ip
    type: IPv4
  - name: dst_ip
    type: IPv4
  - name: domain
    type: String
  - name: dns_type
    type: LowCardinality(String)
  - name: response_code
    type: UInt16
transformers:
  - type: ip_matcher
    fields:
      - src_ip
      - dst_ip
    label_fields:
      - src_geo
      - dst_geo
  - type: dict_mapper
    field: dns_type
    dict:
      "1": "A"
      "28": "AAAA"
      "5": "CNAME"
      "2": "NS"
      "15": "MX"
clickhouse_table: raw.dns_log
workers: 4
batch_size: 5000
